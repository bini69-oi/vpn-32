# Bedolaga — Telegram + Web API для продажи VPN на Remnawave
# Upstream: https://github.com/BEDOLAGA-DEV/remnawave-bedolaga-telegram-bot
# Документация: https://docs.bedolagam.ru
#
# Безопасность по умолчанию:
#   • Postgres и Redis НЕ проброшены на хост (только внутри docker-сети).
#   • Порт 8080 бота — только 127.0.0.1 (снаружи недоступен; наружу — через Caddy/nginx + TLS).
#   • См. README раздел «Безопасность».

services:
  postgres:
    image: postgres:15-alpine
    container_name: remnawave_bot_db
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-remnawave_bot}
      POSTGRES_USER: ${POSTGRES_USER:-remnawave_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_STRONG_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot_network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-remnawave_user} -d ${POSTGRES_DB:-remnawave_bot}',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: remnawave_bot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - bot_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

  bot:
    image: ghcr.io/bedolaga-dev/remnawave-bedolaga-telegram-bot:latest
    container_name: remnawave_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      FORCE_COLOR: '1'
      DOCKER_ENV: 'true'
      DATABASE_MODE: 'auto'
      POSTGRES_HOST: 'postgres'
      POSTGRES_PORT: '5432'
      POSTGRES_DB: '${POSTGRES_DB:-remnawave_bot}'
      POSTGRES_USER: '${POSTGRES_USER:-remnawave_user}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-CHANGE_ME_STRONG_DB_PASSWORD}'
      REDIS_URL: 'redis://redis:6379/0'
      TZ: 'Europe/Moscow'
      LOCALES_PATH: '${LOCALES_PATH:-/app/locales}'
    volumes:
      - ./logs:/app/logs:rw
      - ./data:/app/data:rw
      - ./uploads:/app/uploads:rw
      - ./vpn_logo.png:/app/vpn_logo.png:ro
    ports:
      # Только localhost: снижает риск сканирования / DDoS по API и перебор токена с интернета.
      - '127.0.0.1:${WEB_API_PORT:-8080}:8080'
    # На части VPS Docker отдаёт для api.telegram.org AAAA без рабочего IPv6 →
    # «Network is unreachable» / TelegramNetworkError внутри контейнера, хотя с хоста curl ок.
    # Статическая A-запись заставляет исходящий трафик идти по IPv4 (IP при сбоях: dig +short api.telegram.org).
    extra_hosts:
      - 'api.telegram.org:149.154.166.110'
    networks:
      - bot_network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8080/health'', timeout=5)"',
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Веб-кабинет (фронт). Профиль cabinet — без второго Caddy на :80/:443.
  # Если бот на том же VPS, что Remnawave: см. README «Один сервер с панелью».
  # Отдельный Caddy только для выделенного сервера бота:
  #   docker compose --profile cabinet --profile cabinet-caddy up -d
  # Документация: https://docs.bedolagam.ru/cabinet/setup
  cabinet-frontend:
    profiles: [cabinet]
    image: ghcr.io/bedolaga-dev/bedolaga-cabinet:latest
    container_name: cabinet_frontend
    restart: unless-stopped
    networks:
      - bot_network

  caddy-cabinet:
    profiles: [cabinet-caddy]
    image: caddy:2-alpine
    container_name: bedolaga_cabinet_caddy
    restart: unless-stopped
    depends_on:
      - bot
      - cabinet-frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./caddy/Cabinetfile:/etc/caddy/Cabinetfile:ro
      - caddy_cabinet_data:/data
      - caddy_cabinet_config:/config
    networks:
      - bot_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_cabinet_data:
    driver: local
  caddy_cabinet_config:
    driver: local

networks:
  bot_network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: '1350'
